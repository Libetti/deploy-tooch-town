services:
  lightning-rod:
    image: libetti/lightning-rod:latest
    container_name: lightning-rod
    expose:
      - "8000"
    networks:
      - backend
    restart: unless-stopped

  tooch-town:
    image: libetti/tooch-town:latest
    container_name: tooch-town
    environment:
      - LIGHTNING_API_BASE_URL=http://lightning-rod:8000
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
    ports:
      - "3000:3000"
    depends_on:
      - lightning-rod
    networks:
      - frontend
      - backend
    restart: unless-stopped

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
