name: Deploy tooch-town stack

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: SSH into server and deploy stack
        uses: appleboy/ssh-action@v1.0.3
        env:
          DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}
          DOCKER_HUB_TOKEN: ${{ secrets.DOCKER_HUB_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          LOGS_ADMIN_PASSWORD: ${{ secrets.LOGS_ADMIN_PASSWORD }}
          LOGS_JWT_SECRET: ${{ secrets.LOGS_JWT_SECRET}}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: DOCKER_HUB_USERNAME,DOCKER_HUB_TOKEN
          script: |
            echo "$DOCKER_HUB_TOKEN" | docker login -u "$DOCKER_HUB_USERNAME" --password-stdin
            cd /home/libetti/deploy-tooch-town
            git checkout main
            git pull origin main

            echo "LOGS_JWT_SECRET=${{ secrets.LOGS_JWT_SECRET }}" > .env
            echo "LOGS_ADMIN_PASSWORD=${{ secrets.LOGS_ADMIN_PASSWORD }}" > .env
            echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" > .env
            echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" > .env
            chmod 600 .env

            docker compose pull
            docker compose --env-file .env up -d
            docker image prune -f
